<title>Wizard Battle — Card Reference</title>
<style>
  :root {
    --bg: #120f19;
    --ink: #f5ecdd;
    --muted: #c7bba4;
    --line: rgba(255, 236, 209, 0.14);
    --gold: #f0be63;
    --card: rgba(18, 13, 25, 0.78);

    --c-Fire:      #ff4422;
    --c-Water:     #2277ff;
    --c-Rock:      #a87832;
    --c-Lightning: #ffe000;
    --c-Ice:       #88ddff;
    --c-Shadow:    #bb33ee;
    --c-Light:     #ffe066;
    --c-Grass:     #33aa55;
    --c-Neutral:   #aaaaaa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    color: var(--ink);
    font-family: "Avenir Next Condensed", "Gill Sans", "Trebuchet MS", sans-serif;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,123,71,.16), transparent 30%),
      radial-gradient(circle at 80% 0%,  rgba(134,184,255,.18), transparent 30%),
      radial-gradient(circle at 50% 60%, rgba(164,123,255,.14), transparent 38%),
      linear-gradient(180deg, #17111f 0%, #0d0a12 55%, #08060a 100%);
    min-height: 100vh;
    padding-bottom: 64px;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: .22;
    background-image:
      linear-gradient(rgba(255,236,209,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,236,209,.05) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: linear-gradient(180deg, black, transparent 90%);
  }

  a { color: inherit; text-decoration: none; }

  /* ── Topbar ── */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    backdrop-filter: blur(16px);
    background: rgba(8,6,10,.45);
    border-bottom: 1px solid rgba(255,236,209,.08);
    width: 100%;
  }
  .topbar-inner {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 16px; max-width: 1180px; margin: 0 auto;
  }
  .brand { display: flex; align-items: center; gap: 14px; letter-spacing: .08em; text-transform: uppercase; }
  .brand-mark {
    width: 42px; height: 42px; border-radius: 14px; padding: 8px;
    background: linear-gradient(135deg, rgba(240,190,99,.22), rgba(164,123,255,.2));
    border: 1px solid rgba(255,236,209,.18);
  }
  .brand-copy strong { display: block; font-size: .9rem; }
  .brand-copy span   { display: block; color: var(--muted); font-size: .72rem; }
  .nav { display: flex; align-items: center; gap: 14px; color: var(--muted); font-size: .9rem; }
  .nav a:hover { color: var(--ink); }

  /* ── Filter bar ── */
  .filter-bar {
    position: sticky; top: 75px; z-index: 10;
    display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
    padding: 12px 16px;
    backdrop-filter: blur(12px);
    background: rgba(8,6,10,.4);
    border-bottom: 1px solid rgba(255,236,209,.06);
  }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px; font-size: .75rem;
    font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    cursor: pointer; border: 1px solid var(--line);
    background: rgba(255,236,209,.04); color: var(--muted);
    transition: all .15s;
  }
  .filter-btn:hover { background: rgba(255,236,209,.1); color: var(--ink); }
  .filter-btn.active { color: var(--bg); font-weight: 800; border-color: transparent; }

  /* ── Page shell ── */
  .page { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 32px 16px 0; }

  h1 {
    font-family: Georgia, serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    letter-spacing: .06em; color: var(--gold);
    margin-bottom: 6px; text-align: center;
  }
  .subtitle { font-size: .85rem; color: var(--muted); margin-bottom: 32px; text-align: center; letter-spacing: .05em; }

  /* ── Section ── */
  .section { margin-bottom: 48px; }
  .section-title {
    font-family: Georgia, serif;
    font-size: 1.1rem; letter-spacing: .08em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 20px; padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .section-title .section-icon { font-size: 1.3rem; }

  /* ── Type group ── */
  .type-group { margin-bottom: 32px; }
  .type-label {
    font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
    margin-bottom: 10px; padding: 3px 10px; border-radius: 4px;
    display: inline-block; opacity: .9;
  }

  /* ── Card grid ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 10px;
  }

  /* ── Spell card ── */
  .spell-card {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--line);
    padding: 12px 14px 12px 16px;
    border-left-width: 3px;
    transition: border-color .15s, background .15s;
    display: flex; flex-direction: column; gap: 6px;
  }
  .spell-card:hover {
    background: rgba(28,19,37,.92);
    border-top-color: rgba(255,236,209,.22);
    border-right-color: rgba(255,236,209,.22);
    border-bottom-color: rgba(255,236,209,.22);
  }

  .card-header {
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
  }
  .card-name { font-size: .92rem; font-weight: 700; color: var(--ink); line-height: 1.2; }
  .card-cost {
    flex-shrink: 0;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(164,123,255,.25);
    border: 1px solid rgba(164,123,255,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem; font-weight: 800; color: #c8aaff;
  }
  .card-cost.free { background: rgba(80,200,80,.18); border-color: rgba(80,200,80,.35); color: #88ee88; }

  .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .rarity-badge {
    font-size: .62rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    padding: 1px 6px; border-radius: 3px;

  .rarity-common   { background: rgba(200,190,170,.12); color: #bbb; border: 1px solid rgba(200,190,170,.2); }
  .rarity-uncommon { background: rgba(130,170,255,.15); color: #88aaee; border: 1px solid rgba(130,170,255,.25); }
  .rarity-rare     { background: rgba(240,190,99,.18);  color: var(--gold); border: 1px solid rgba(240,190,99,.3); }
  .rarity-starter  { background: rgba(164,123,255,.15); color: #c8aaff; border: 1px solid rgba(164,123,255,.25); }

  .tag {
    font-size: .6rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    padding: 1px 5px; border-radius: 3px;
  }
  .tag-fade   { background: rgba(255,236,209,.08); color: var(--muted); border: 1px solid var(--line); }
  .tag-onhit  { background: rgba(80,200,120,.12); color: #77cc88; border: 1px solid rgba(80,200,120,.2); }
  .tag-copies { background: rgba(240,190,99,.18); color: var(--gold); border: 1px solid rgba(240,190,99,.3); font-weight: 800; }

  .card-desc { font-size: .78rem; color: var(--muted); line-height: 1.5; }

  .tb-Fire      { background:#4a1a0a; color:#ff6633; border:1px solid #8a2a10; }
  .tb-Ice       { background:#0a2030; color:#66ddff; border:1px solid #1a4060; }
  .tb-Lightning { background:#2a2000; color:#ffdd00; border:1px solid #504000; }
  .tb-Water     { background:#0a1840; color:#4488ff; border:1px solid #1a2870; }
  .tb-Rock      { background:#1a1208; color:#cc9944; border:1px solid #3a2810; }
  .tb-Light     { background:#282210; color:#ffdd88; border:1px solid #504420; }
  .tb-Shadow    { background:#1a0a2a; color:#cc66ff; border:1px solid #3a1a5a; }
  .tb-Grass     { background:#0a1e10; color:#44cc66; border:1px solid #1a3820; }

  .spell-card.t-Water     { border-left-color: var(--c-Water); }
  .spell-card.t-Rock      { border-left-color: var(--c-Rock); }
  .spell-card.t-Lightning { border-left-color: var(--c-Lightning); }
  .spell-card.t-Ice       { border-left-color: var(--c-Ice); }
  .spell-card.t-Shadow    { border-left-color: var(--c-Shadow); }
  .spell-card.t-Light     { border-left-color: var(--c-Light); }
  .spell-card.t-Grass     { border-left-color: var(--c-Grass); }
  .spell-card.t-Neutral   { border-left-color: var(--c-Neutral); }

  /* ── Hide/show sections ── */
  .section { display: block; }
  .section.hidden { display: none; }
</style>
</head>

// ─── Render ─────────────────────────────────────────────────────────────────
function renderCard(card) {
  const tags = card.tags || [];
  const hasFade  = tags.includes('fade');
  const hasOnHit = tags.includes('on-hit');

  const costClass = card.cost === 0 ? 'card-cost free' : 'card-cost';
  const costLabel = card.cost === 0 ? '0' : card.cost;

  const copiesHtml = (card.copies && card.copies > 1)
    ? `<span class="tag tag-copies">×${card.copies}</span>` : '';

  const tagHtml = [
    copiesHtml,
    hasFade  ? `<span class="tag tag-fade">Fade</span>` : '',
    hasOnHit ? `<span class="tag tag-onhit">On Hit</span>` : '',
  ].join('');

  return `
    <div class="spell-card t-${card.type}">
      <div class="card-header">
        <span class="card-name">${card.name}</span>
        <span class="${costClass}">${costLabel}</span>
      </div>
      <div class="card-meta">
        <span class="rarity-badge rarity-${card.rarity || 'starter'}">${card.rarity || 'starter'}</span>
        <span class="rarity-badge tb-${card.type}">${TYPE_ICONS[card.type]} ${card.type}</span>
        ${tagHtml}
      </div>
      <div class="card-desc">${card.desc}</div>
    </div>`;
}

const SHOP_TYPES = ['Fire','Water','Rock','Lightning','Ice','Shadow','Light','Grass'];

function buildShopSection() {
  let html = `<div class="section" id="sec-shop">
    <div class="section-title"><span class="section-icon">🏪</span> Shop Cards</div>`;

  SHOP_TYPES.forEach(type => {
    const cards = SHOP_CARDS.filter(c => c.type === type);
    if (!cards.length) return;
    const sorted = [...cards].sort((a,b) => {
      const ro = {common:0,uncommon:1,rare:2};
      return (ro[a.rarity]||0) - (ro[b.rarity]||0) || a.cost - b.cost;
    });
    html += `<div class="type-group">
      <div class="type-label tb-${type}">${TYPE_ICONS[type]} ${type}</div>
      <div class="card-grid">
        ${sorted.map(renderCard).join('')}
      </div>
    </div>`;
  });

  html += `</div>`;
  return html;
}

function buildStarterSection() {
  let html = `<div class="section" id="sec-starter">
    <div class="section-title"><span class="section-icon">⚔️</span> Starter Decks <span style="font-size:.7rem;font-weight:400;color:var(--muted);letter-spacing:.04em;text-transform:none;font-family:sans-serif;">(6 class cards + 4 neutral)</span></div>`;

  Object.entries(STARTER_DECKS).forEach(([wid, cards]) => {
    const wtype = WIZARD_TYPE[wid];
    const allCards = [
      ...cards.map(c => ({...c, rarity:'starter'})),
      ...NEUTRAL_CARDS.map(c => ({...c, rarity:'starter'})),
    ];
    html += `<div class="type-group">
      <div class="type-label tb-${wtype}">${WIZARD_ICONS[wid]} ${WIZARD_NAMES[wid]}</div>
      <div class="card-grid">
        ${allCards.map(renderCard).join('')}
      </div>
    </div>`;
  });

  html += `</div>`;
  return html;
}

function buildUniversalSection() {
  return `<div class="section" id="sec-universal">
    <div class="section-title"><span class="section-icon">✨</span> Neutral Cards <span style="font-size:.7rem;font-weight:400;color:var(--muted);letter-spacing:.04em;text-transform:none;font-family:sans-serif;">(4 cards shared by all classes)</span></div>
    <div class="card-grid">
      ${NEUTRAL_CARDS.map(c => renderCard({...c, rarity:'starter'})).join('')}
    </div>
  </div>`;
}

// Inject
const root = document.getElementById('cardRoot');
root.innerHTML = buildStarterSection() + buildShopSection() + buildUniversalSection();

// ─── Filter ──────────────────────────────────────────────────────────────────
const SEC_MAP = { shop:'sec-shop', starter:'sec-starter', universal:'sec-universal' };

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  const filter = btn.dataset.filter;

  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Set active color
  const typeColor = {
    all:'var(--gold)', shop:'var(--gold)', starter:'#c8aaff', universal:'#88ee88'
  }[filter] || 'var(--gold)';
  btn.style.background = typeColor;
  btn.style.color = '#120f19';

  // Reset others
  document.querySelectorAll('.filter-btn:not(.active)').forEach(b => {
    b.style.background = '';
    b.style.color = '';
  });

  Object.entries(SEC_MAP).forEach(([key, secId]) => {
    const el = document.getElementById(secId);
    if (!el) return;
    el.classList.toggle('hidden', filter !== 'all' && filter !== key);
  });
});

// Set initial active style
document.querySelector('.filter-btn.active').style.background = 'var(--gold)';
document.querySelector('.filter-btn.active').style.color = '#120f19';
</script>
</body>
</html>
