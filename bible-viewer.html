<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Viewer</title>
    <link rel="stylesheet" href="shared-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            overflow: hidden;
            height: 100vh;
        }

        .layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            border-right: 1px solid var(--line);
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px 16px 14px;
            border-bottom: 1px solid var(--line);
            flex-shrink: 0;
        }

        .sidebar-header strong {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .sidebar-header span {
            display: block;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .file-list {
            list-style: none;
            margin: 0;
            padding: 8px 0;
            overflow-y: auto;
            flex: 1;
        }

        .file-list li button {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 9px 16px;
            font-size: 0.88rem;
            color: var(--muted);
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: color 120ms, border-color 120ms, background 120ms;
            line-height: 1.3;
        }

        .file-list li button:hover {
            color: var(--ink);
            background: rgba(255, 236, 209, 0.04);
        }

        .file-list li button.active {
            color: var(--gold);
            border-left-color: var(--gold);
            background: rgba(240, 190, 99, 0.06);
        }

        /* ── Main content ── */
        .content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 16px 32px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: rgba(8, 6, 10, 0.3);
        }

        .content-header h1 {
            margin: 0;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--ink);
        }

        .content-header .filepath {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: "SF Mono", "Fira Code", monospace;
        }

        .scroll-area {
            overflow-y: auto;
            flex: 1;
            padding: 36px 48px 64px;
        }

        /* ── Markdown rendering ── */
        .md h1, .md h2, .md h3 {
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
        }

        .md h1 {
            font-size: 2rem;
            margin: 0 0 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--line-strong);
        }

        .md h2 {
            font-size: 1.3rem;
            margin: 36px 0 12px;
            color: var(--gold);
        }

        .md h3 {
            font-size: 1.05rem;
            margin: 24px 0 8px;
            color: var(--sky);
            font-family: inherit;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .md p {
            color: var(--muted);
            line-height: 1.75;
            margin: 0 0 14px;
            max-width: 72ch;
        }

        .md strong {
            color: var(--ink);
        }

        .md em {
            color: var(--muted);
        }

        .md hr {
            border: none;
            border-top: 1px solid var(--line);
            margin: 28px 0;
        }

        .md ul, .md ol {
            color: var(--muted);
            padding-left: 1.4em;
            margin: 0 0 14px;
            line-height: 1.7;
        }

        .md li {
            margin-bottom: 4px;
        }

        .md code {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 0.85em;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 1px 6px;
            color: var(--sky);
        }

        .md pre {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 18px 20px;
            overflow-x: auto;
            margin: 0 0 18px;
        }

        .md pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--moss);
            font-size: 0.88rem;
            line-height: 1.6;
        }

        .md blockquote {
            margin: 0 0 16px;
            padding: 10px 16px;
            border-left: 3px solid var(--plum);
            background: rgba(164, 123, 255, 0.06);
            border-radius: 0 6px 6px 0;
        }

        .md blockquote p {
            margin: 0;
            color: var(--muted);
            font-style: italic;
        }

        /* Tables */
        .md table {
            width: 100%;
            border-collapse: collapse;
            margin: 0 0 20px;
            font-size: 0.9rem;
        }

        .md thead tr {
            border-bottom: 2px solid var(--line-strong);
        }

        .md th {
            text-align: left;
            padding: 8px 12px;
            color: var(--gold);
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .md td {
            padding: 8px 12px;
            color: var(--muted);
            border-bottom: 1px solid var(--line);
            vertical-align: top;
            line-height: 1.5;
        }

        .md td strong {
            color: var(--ink);
        }

        .md td code {
            font-size: 0.82em;
        }

        .md tbody tr:last-child td {
            border-bottom: none;
        }

        .md tbody tr:hover td {
            background: rgba(255, 236, 209, 0.03);
        }

        /* Empty / loading state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--muted);
            gap: 8px;
        }

        .empty-state span {
            font-size: 2.5rem;
        }

        .empty-state p {
            font-size: 0.9rem;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <strong>Wizard Battle</strong>
            <span>Design Bibles</span>
        </div>
        <ul class="file-list" id="fileList"></ul>
    </aside>

    <div class="content">
        <div class="content-header">
            <h1 id="contentTitle">Select a document</h1>
            <span class="filepath" id="contentPath"></span>
        </div>
        <div class="scroll-area">
            <div class="md" id="mdContent">
                <div class="empty-state">
                    <span>📖</span>
                    <p>Choose a bible from the sidebar</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const FILES = [
        { label: 'Classes & Starting Decks', file: 'classes.md' },
        { label: 'Starting Decks', file: 'starting-decks.md' },
        { label: 'Spells', file: 'spells.md' },
        { label: 'Enemies', file: 'enemies.md' },
        { label: 'Status Effects', file: 'status-effects.md' },
        { label: 'Type Matchups', file: 'type-matchups.md' },
        { label: 'Game Systems', file: 'game-systems.md' },
        { label: 'Map & Progression', file: 'map-and-progression.md' },
        { label: 'World & Lore', file: 'world-and-lore.md' },
        { label: 'UI & Design', file: 'ui-and-design.md' },
        { label: 'HTML Styling Guide', file: 'HTML_STYLING_GUIDE.md' },
    ];

    const fileList    = document.getElementById('fileList');
    const mdContent   = document.getElementById('mdContent');
    const contentTitle = document.getElementById('contentTitle');
    const contentPath  = document.getElementById('contentPath');

    let activeBtn = null;

    FILES.forEach(({ label, file }) => {
        const li  = document.createElement('li');
        const btn = document.createElement('button');
        btn.textContent = label;
        btn.addEventListener('click', () => loadFile(file, label, btn));
        li.appendChild(btn);
        fileList.appendChild(li);
    });

    async function loadFile(file, label, btn) {
        if (activeBtn) activeBtn.classList.remove('active');
        btn.classList.add('active');
        activeBtn = btn;

        contentTitle.textContent = label;
        contentPath.textContent  = `Bibles/${file}`;
        mdContent.innerHTML      = '<div class="empty-state"><span>⏳</span><p>Loading…</p></div>';

        try {
            const res  = await fetch(`Bibles/${file}`);
            const text = await res.text();
            mdContent.innerHTML = marked.parse(text);
        } catch (e) {
            mdContent.innerHTML = `<p style="color:var(--ember)">Failed to load ${file}</p>`;
        }
    }

    // Load first file on open
    const firstBtn = fileList.querySelector('button');
    if (firstBtn) firstBtn.click();
</script>
</body>
</html>
