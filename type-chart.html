<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Battle — Type Chart</title>
<style>
  :root {
    --bg: #120f19;
    --bg-deep: #09070d;
    --ink: #f5ecdd;
    --muted: #c7bba4;
    --line: rgba(255, 236, 209, 0.14);
    --gold: #f0be63;
    --ember: #ff7b47;
    --sky: #86b8ff;
    --moss: #7cc98c;
    --plum: #a47bff;
    --card: rgba(18, 13, 25, 0.78);
    --card-strong: rgba(28, 19, 37, 0.92);
    --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    min-width: 320px;
    color: var(--ink);
    font-family: "Avenir Next Condensed", "Gill Sans", "Trebuchet MS", sans-serif;
    background:
      radial-gradient(circle at 20% 20%, rgba(255, 123, 71, 0.16), transparent 30%),
      radial-gradient(circle at 80% 0%, rgba(134, 184, 255, 0.18), transparent 30%),
      radial-gradient(circle at 50% 60%, rgba(164, 123, 255, 0.14), transparent 38%),
      linear-gradient(180deg, #17111f 0%, #0d0a12 55%, #08060a 100%);
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding-bottom: 64px;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.22;
    background-image:
      linear-gradient(rgba(255, 236, 209, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 236, 209, 0.05) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: linear-gradient(180deg, black, transparent 90%);
  }

  a { color: inherit; text-decoration: none; }

  /* ── Topbar ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(16px);
    background: rgba(8, 6, 10, 0.45);
    border-bottom: 1px solid rgba(255, 236, 209, 0.08);
    width: 100%;
  }

  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 16px 16px;
    max-width: 1180px;
    margin: 0 auto;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .brand-mark {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    padding: 8px;
    background: linear-gradient(135deg, rgba(240, 190, 99, 0.22), rgba(164, 123, 255, 0.2));
    border: 1px solid rgba(255, 236, 209, 0.18);
    box-shadow: 0 0 24px rgba(240, 190, 99, 0.1);
  }

  .brand-copy strong {
    display: block;
    font-size: 0.9rem;
  }

  .brand-copy span {
    display: block;
    color: var(--muted);
    font-size: 0.72rem;
  }

  .nav {
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .nav a:hover { color: var(--ink); }

  /* ── Page content ── */
  .page-content {
    position: relative;
    z-index: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 0;
  }

  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: 0.06em;
    color: var(--gold);
    margin-bottom: 6px;
    text-align: center;
  }

  .subtitle {
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 36px;
    letter-spacing: 0.05em;
    text-align: center;
  }

  /* ── Wheel ── */
  .wheel-section {
    display: flex;
    justify-content: center;
    margin-bottom: 40px;
  }

  .wheel-container {
    position: relative;
    width: 340px;
    height: 460px;
  }

  svg.wheel { width: 340px; height: 460px; overflow: visible; }

  .type-node {
    cursor: pointer;
    transition: filter 0.15s;
  }
  .type-node:hover { filter: brightness(1.3); }
  .type-node.selected { filter: brightness(1.5) drop-shadow(0 0 8px currentColor); }
  .type-node.dimmed { filter: brightness(0.35) saturate(0.2); }

  /* ── Full matrix ── */
  .matrix-section {
    width: 100%;
    max-width: 740px;
  }

  .matrix-section h2 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 14px;
    text-align: center;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 3px;
    font-size: 0.78rem;
  }

  th, td {
    text-align: center;
    padding: 6px 4px;
    border-radius: 6px;
  }

  thead th {
    background: transparent;
    color: var(--muted);
    font-weight: 600;
  }

  tbody th {
    background: rgba(18, 13, 25, 0.78);
    color: var(--ink);
    font-weight: 600;
    text-align: right;
    padding-right: 8px;
    white-space: nowrap;
    border: 1px solid var(--line);
  }

  td.eff-2   { background: #1a4a2a; color: #66ffaa; font-weight: 700; }
  td.eff-1   { background: rgba(18, 13, 25, 0.6); color: rgba(197, 187, 164, 0.4); border: 1px solid rgba(255, 236, 209, 0.06); }
  td.eff-05  { background: #3a1a1a; color: #ff7755; font-weight: 700; }

  td.eff-2:hover, td.eff-1:hover, td.eff-05:hover {
    filter: brightness(1.5);
    cursor: default;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="index.html">
      <img class="brand-mark" src="icons/wizard-hat.png" alt="Wizard Battle icon">
      <div class="brand-copy">
        <strong>Wizard Battle</strong>
        <span>Arcane Roguelike Deckbuilder</span>
      </div>
    </a>
    <nav class="nav">
      <a href="index.html#features">Features</a>
      <a href="index.html#wizards">Wizards</a>
      <a href="keywords.html">Keywords</a>
      <a href="type-chart.html">Type Chart</a>
    </nav>
  </div>
</header>

<div class="page-content">

  <h1>⚔ Type Chart</h1>
  <p class="subtitle">Click a type to highlight its strengths &amp; weaknesses</p>

  <div class="wheel-section">
    <div class="wheel-container">
      <svg class="wheel" viewBox="-175 -170 350 470" id="wheelSvg">
        <defs>
          <marker id="arr-super" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#66ff99" opacity="0.85"/>
          </marker>
          <marker id="arr-weak" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#ff6655" opacity="0.85"/>
          </marker>
          <marker id="arr-self" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#ff7755" opacity="0.9"/>
          </marker>
        </defs>

        <!-- Arrows drawn by JS -->
        <g id="arrowLayer"></g>
        <!-- Nodes drawn by JS -->
        <g id="nodeLayer"></g>
      </svg>
    </div>
  </div>

  <!-- Full matrix -->
  <div class="matrix-section">
    <h2>Full Effectiveness Matrix &nbsp; (Attacker → Defender)</h2>
    <table id="matrixTable"></table>
  </div>

</div>

<script>
const TYPES = ['Fire','Water','Rock','Lightning','Ice','Shadow','Light','Grass'];

const TYPE_ICONS = {
  Fire:'🔥', Water:'🌊', Rock:'🪨', Lightning:'⚡', Ice:'❄️', Shadow:'🌑', Light:'☀️', Grass:'🌿'
};
const TYPE_COLORS = {
  Fire:'#ff4422', Water:'#2277ff', Rock:'#a87832',
  Lightning:'#ffe000', Ice:'#88ddff', Shadow:'#bb33ee', Light:'#ffe066', Grass:'#33aa55'
};
const TYPE_EFFECTIVENESS = {
  //             Fire    Water   Rock    Lightning  Ice     Shadow  Light   Grass
  // Cycle: Fire > Grass > Ice > Rock > Lightning > Water > Fire
  Fire:      {Fire:1,   Water:0.5, Rock:1,   Lightning:1,   Ice:1,   Shadow:1,   Light:1,   Grass:2   },
  Water:     {Fire:2,   Water:1,   Rock:1,   Lightning:0.5, Ice:1,   Shadow:1,   Light:1,   Grass:1   },
  Rock:      {Fire:1,   Water:1,   Rock:1,   Lightning:2,   Ice:0.5, Shadow:1,   Light:1,   Grass:1   },
  Lightning: {Fire:1,   Water:2,   Rock:0.5, Lightning:1,   Ice:1,   Shadow:1,   Light:1,   Grass:1   },
  Ice:       {Fire:1,   Water:1,   Rock:2,   Lightning:1,   Ice:1,   Shadow:1,   Light:1,   Grass:0.5 },
  Shadow:    {Fire:1,   Water:1,   Rock:1,   Lightning:1,   Ice:1,   Shadow:0.5, Light:2,   Grass:1   },
  Light:     {Fire:1,   Water:1,   Rock:1,   Lightning:1,   Ice:1,   Shadow:2,   Light:0.5, Grass:1   },
  Grass:     {Fire:0.5, Water:1,   Rock:1,   Lightning:1,   Ice:2,   Shadow:1,   Light:1,   Grass:1   },
};

// ── Wheel layout ──────────────────────────────────────────────────────────────
// Main cycle: Fire > Grass > Ice > Rock > Lightning > Water > Fire
// Shadow and Light: placed flanking at bottom

const WHEEL_TYPES = ['Fire','Grass','Ice','Rock','Lightning','Water','Shadow','Light'];
const R_MAIN = 110; // radius for main 6
const R_PAIR = 95;  // radius for shadow/light

function typePos(t) {
  const idx6 = ['Fire','Grass','Ice','Rock','Lightning','Water'].indexOf(t);
  if (idx6 !== -1) {
    const angle = (idx6 / 6) * Math.PI * 2 - Math.PI / 2;
    return { x: Math.cos(angle) * R_MAIN, y: Math.sin(angle) * R_MAIN };
  }
  // Shadow & Light flanking below
  if (t === 'Shadow') return { x: -75, y: 210 };
  if (t === 'Light')  return { x:  75, y: 210 };
}

// Shorten a line so arrows don't overlap with circles
function shortenLine(x1, y1, x2, y2, amt) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  return {
    x1: x1 + dx/len * amt,
    y1: y1 + dy/len * amt,
    x2: x2 - dx/len * amt,
    y2: y2 - dy/len * amt,
  };
}

const svg = document.getElementById('wheelSvg');
const arrowLayer = document.getElementById('arrowLayer');
const nodeLayer  = document.getElementById('nodeLayer');

// Draw ALL 2× and 0.5× arrows from the full effectiveness table
const OFFSET = 10;

function hasBothDirections(from, to) {
  const fv = TYPE_EFFECTIVENESS[from][to];
  const rv = TYPE_EFFECTIVENESS[to][from];
  return (fv >= 2 || fv <= 0.5) && (rv >= 2 || rv <= 0.5);
}

function pairOffset(from, to, val) {
  const pa = typePos(from), pb = typePos(to);
  const dx = pb.x - pa.x, dy = pb.y - pa.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  // Normal pointing left of the from→to direction
  const nx = -dy / len, ny = dx / len;
  // Midpoint of the edge
  const mx = (pa.x + pb.x) / 2, my = (pa.y + pb.y) / 2;
  // Dot with midpoint to determine if normal points outward from center
  const outward = (mx * nx + my * ny) > 0 ? 1 : -1;
  // green (2x) outside, red (0.5x) inside
  const side = val >= 2 ? outward : -outward;
  return { ox: nx * OFFSET * side, oy: ny * OFFSET * side };
}

TYPES.forEach(attacker => {
  TYPES.forEach(defender => {
    if (attacker === defender) return; // self-loops handled below
    const val = TYPE_EFFECTIVENESS[attacker][defender];
    if (val !== 2 && val !== 0.5) return;

    const p1 = typePos(attacker), p2 = typePos(defender);
    let ox = 0, oy = 0;
    if (hasBothDirections(attacker, defender)) {
      const off = pairOffset(attacker, defender, val);
      ox = off.ox; oy = off.oy;
    }

    const s = shortenLine(p1.x + ox, p1.y + oy, p2.x + ox, p2.y + oy, 36);
    const color  = val >= 2 ? '#66ff99' : '#ff7755';
    const marker = val >= 2 ? 'arr-super'  : 'arr-self';

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', s.x1); line.setAttribute('y1', s.y1);
    line.setAttribute('x2', s.x2); line.setAttribute('y2', s.y2);
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', '2');
    line.setAttribute('opacity', '0.6');
    line.setAttribute('marker-end', `url(#${marker})`);
    line.setAttribute('class', `arrow from-${attacker} to-${defender}`);
    arrowLayer.appendChild(line);
  });
});

// Draw self-loops for any type with 0.5× or 2× vs itself
TYPES.forEach(t => {
  const val = TYPE_EFFECTIVENESS[t][t];
  if (val === 1) return; // no self-relationship to show

  const pos = typePos(t);
  const isLeft = pos.x < 0;
  const isRight = pos.x > 0;
  let cx1, cy1, cx2, cy2, startX, startY, endX, endY;

  if (t === 'Shadow' || t === 'Light') {
    startX = pos.x - 8; startY = pos.y + 30;
    cx1    = pos.x - 40; cy1   = pos.y + 68;
    cx2    = pos.x + 40; cy2   = pos.y + 68;
    endX   = pos.x + 8; endY   = pos.y + 30;
  } else if (isLeft) {
    startX = pos.x - 22; startY = pos.y - 8;
    cx1    = pos.x - 60; cy1    = pos.y - 40;
    cx2    = pos.x - 60; cy2    = pos.y + 24;
    endX   = pos.x - 22; endY   = pos.y + 8;
  } else if (isRight) {
    startX = pos.x + 22; startY = pos.y - 8;
    cx1    = pos.x + 60; cy1    = pos.y - 40;
    cx2    = pos.x + 60; cy2    = pos.y + 24;
    endX   = pos.x + 22; endY   = pos.y + 8;
  } else {
    startX = pos.x - 8; startY = pos.y + 22;
    cx1    = pos.x - 40; cy1   = pos.y + 60;
    cx2    = pos.x + 40; cy2   = pos.y + 60;
    endX   = pos.x + 8; endY   = pos.y + 22;
  }

  const color = val >= 2 ? '#66ff99' : '#ff7755';
  const markerId = val >= 2 ? 'arr-super' : 'arr-self';

  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  const d = `M ${startX},${startY} C ${cx1},${cy1} ${cx2},${cy2} ${endX},${endY}`;
  path.setAttribute('d', d);
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', '2');
  path.setAttribute('fill', 'none');
  path.setAttribute('opacity', '0.7');
  path.setAttribute('marker-end', `url(#${markerId})`);
  path.setAttribute('class', `self-arrow from-${t} to-${t}`);
  arrowLayer.appendChild(path);
});

// Draw nodes
let selectedType = null;

WHEEL_TYPES.forEach(t => {
  const pos = typePos(t);
  const r = 32;
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','type-node');
  g.setAttribute('data-type', t);
  g.setAttribute('transform', `translate(${pos.x},${pos.y})`);

  const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('r', r);
  circle.setAttribute('fill', TYPE_COLORS[t] + '22');
  circle.setAttribute('stroke', TYPE_COLORS[t]);
  circle.setAttribute('stroke-width','2.5');

  const emoji = document.createElementNS('http://www.w3.org/2000/svg','text');
  emoji.setAttribute('text-anchor','middle');
  emoji.setAttribute('dominant-baseline','central');
  emoji.setAttribute('y','-7');
  emoji.setAttribute('font-size','18');
  emoji.textContent = TYPE_ICONS[t];

  const label = document.createElementNS('http://www.w3.org/2000/svg','text');
  label.setAttribute('text-anchor','middle');
  label.setAttribute('dominant-baseline','central');
  label.setAttribute('y','14');
  label.setAttribute('font-size','8');
  label.setAttribute('fill', TYPE_COLORS[t]);
  label.setAttribute('font-weight','700');
  label.setAttribute('letter-spacing','0.04em');
  label.textContent = t.toUpperCase();

  g.appendChild(circle); g.appendChild(emoji); g.appendChild(label);
  g.addEventListener('click', () => selectType(t));
  nodeLayer.appendChild(g);
});

function selectType(t) {
  if (selectedType === t) {
    selectedType = null;
    nodeLayer.querySelectorAll('.type-node').forEach(n => {
      n.classList.remove('selected','dimmed');
    });
    arrowLayer.querySelectorAll('line, path').forEach(l => l.setAttribute('opacity','0.6'));
    return;
  }
  selectedType = t;

  nodeLayer.querySelectorAll('.type-node').forEach(n => {
    const nt = n.getAttribute('data-type');
    n.classList.remove('selected','dimmed');
    if (nt === t) n.classList.add('selected');
    else n.classList.add('dimmed');
  });

  arrowLayer.querySelectorAll('line, path').forEach(l => {
    const cls = l.getAttribute('class') || '';
    if (cls.includes(`from-${t}`) || cls.includes(`to-${t}`)) {
      l.setAttribute('opacity','1');
    } else {
      l.setAttribute('opacity','0.08');
    }
  });
}

// ── Matrix ────────────────────────────────────────────────────────────────────
const table = document.getElementById('matrixTable');

// Header row
const thead = table.createTHead();
const hrow = thead.insertRow();
const corner = document.createElement('th');
corner.className = 'corner';
corner.style.textAlign = 'right';
corner.style.color = 'rgba(199, 187, 164, 0.4)';
corner.style.fontSize = '0.65rem';
corner.innerHTML = 'ATK ↓ &nbsp; DEF →';
hrow.appendChild(corner);

TYPES.forEach(t => {
  const th = document.createElement('th');
  th.innerHTML = `${TYPE_ICONS[t]}<br><span style="color:${TYPE_COLORS[t]};font-size:0.65rem">${t}</span>`;
  hrow.appendChild(th);
});

// Body
const tbody = table.createTBody();
TYPES.forEach(attacker => {
  const row = tbody.insertRow();
  const th = document.createElement('th');
  th.innerHTML = `${TYPE_ICONS[attacker]} <span style="color:${TYPE_COLORS[attacker]}">${attacker}</span>`;
  row.appendChild(th);

  TYPES.forEach(defender => {
    const td = row.insertCell();
    const val = TYPE_EFFECTIVENESS[attacker][defender];
    if (val >= 2) {
      td.className = 'eff-2';
      td.textContent = '2×';
      td.title = `${attacker} → ${defender}: Super effective!`;
    } else if (val <= 0.5) {
      td.className = 'eff-05';
      td.textContent = '½';
      td.title = `${attacker} → ${defender}: Not very effective`;
    } else {
      td.className = 'eff-1';
      td.textContent = '1';
    }
  });
});
</script>
</body>
</html>
