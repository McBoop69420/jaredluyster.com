<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wizard Battle is a roguelike deckbuilder where eight elemental wizards climb the Arcane Tower.">
    <title>Wizard Battle</title>
    <link rel="stylesheet" href="shared-theme.css">
    <style>
        body {
            overflow-x: hidden;
            padding-bottom: 64px;
        }

        /* ── Home ── */
        .hero {
            padding: 72px 0 48px;
        }

        .hero-copy,
        .panel,
        .wizard {
            border: 1px solid var(--line);
            background: var(--card);
            box-shadow: var(--shadow);
        }

        .hero-copy {
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            padding: 36px;
        }

        .hero-copy::before {
            content: "";
            position: absolute;
            inset: auto -12% -36% auto;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(240, 190, 99, 0.22), transparent 68%);
            pointer-events: none;
        }

        h1 {
            margin: 18px 0 12px;
            font-size: clamp(3.2rem, 10vw, 6rem);
            line-height: 0.92;
        }

        h2 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3rem);
        }

        .section-head p,
        .panel p,
        .wizard p {
            color: var(--muted);
            line-height: 1.7;
        }

        .cta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 28px 0 24px;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .stat {
            border-radius: 18px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
        }

        .stat strong {
            display: block;
            font-size: 1.8rem;
            font-family: Georgia, "Times New Roman", serif;
        }

        .stat span {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        section { padding: 26px 0 10px; }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
            margin-bottom: 18px;
        }

        .section-head p { max-width: 34rem; }

        .feature-grid,
        .wizard-grid {
            display: grid;
            gap: 16px;
        }

        .feature-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .wizard-grid  { grid-template-columns: repeat(4, minmax(0, 1fr)); }

        .panel,
        .wizard {
            border-radius: 24px;
            padding: 24px;
        }

        .panel strong,
        .wizard-top strong {
            display: block;
            margin-bottom: 10px;
            font-size: 1.15rem;
        }

        .panel .accent {
            color: var(--gold);
            font-size: 0.82rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .wizard-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 10px;
        }

        .wizard-top span {
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .sigil {
            display: inline-grid;
            place-items: center;
            width: 54px;
            height: 54px;
            margin-bottom: 14px;
            border-radius: 16px;
            font-size: 1.7rem;
            background: rgba(255, 255, 255, 0.05);
        }

        .footer {
            padding: 36px 0 48px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        /* ── Cards ── */
        .page { max-width: 1280px; margin: 0 auto; padding: 32px 16px 0; position: relative; z-index: 1; }

        .page-title {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: var(--gold);
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 32px;
            text-align: center;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 10px;
        }

        .spell-card {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .card-name { font-size: 0.92rem; font-weight: 700; }

        .card-cost {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(164, 123, 255, 0.25);
            border: 1px solid rgba(164, 123, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: #c8aaff;
        }

        .card-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }

        /* ── Keywords ── */
        .page-centered {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 16px 0;
        }

        .keyword-grid {
            width: 100%;
            max-width: 780px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .keyword-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 16px 18px;
            display: grid;
            grid-template-columns: 40px 1fr;
            gap: 0 12px;
            align-items: start;
        }

        .keyword-icon { font-size: 1.6rem; line-height: 1; padding-top: 2px; text-align: center; }

        .keyword-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }

        .keyword-name { font-size: 1rem; font-weight: 700; }

        .keyword-short {
            font-size: 0.78rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .keyword-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

        /* ── Type Chart ── */
        .page-narrow { max-width: 840px; margin: 0 auto; padding: 48px 16px 0; position: relative; z-index: 1; }

        table { width: 100%; border-collapse: separate; border-spacing: 6px; }

        th, td { padding: 10px 8px; text-align: center; border-radius: 10px; }

        th { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

        td { background: var(--card); border: 1px solid var(--line); font-weight: 700; }

        .good { color: #9be48b; }
        .bad  { color: #ffb28f; }

        /* ── Cards extended ── */
        .elem-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 28px;
            justify-content: center;
        }

        .elem-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: var(--card);
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .elem-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
        .elem-btn.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.25); }

        .elem-section { margin-bottom: 32px; }

        .elem-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--elem-color, var(--muted));
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line);
        }

        .rarity {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 2px 7px;
            border-radius: 8px;
        }

        .rarity-common  { background: rgba(156,163,175,0.15); color: #9ca3af; }
        .rarity-uncommon { background: rgba(129,140,248,0.18); color: #a5b4fc; }
        .rarity-rare    { background: rgba(240,190,99,0.18);  color: #f0be63; }
        .rarity-starter { background: rgba(134,184,255,0.15); color: #86b8ff; }

        .starter-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 1px 6px;
            border-radius: 6px;
            background: rgba(255,255,255,0.07);
            color: var(--muted);
        }

        .card-footer {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        /* ── Responsive ── */
        @media (max-width: 980px) {
            .feature-grid,
            .wizard-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 720px) {
            .section-head,
            .feature-grid,
            .wizard-grid,
            .hero-stats {
                display: grid;
                grid-template-columns: 1fr;
            }

            .hero { padding-top: 36px; }
            .hero-copy, .panel, .wizard { padding: 22px; border-radius: 24px; }

            .keyword-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

                    function cardHTML(c) {
                        const rarityClass = 'rarity-' + c.rarity.toLowerCase();
                        return `<article class="spell-card">
                            <div class="card-header">
                                <div class="card-name">${c.name}</div>
                                <div class="card-cost">${c.cost}</div>
                            </div>
                            <div class="card-desc">${c.effects}</div>
                            <div class="card-footer">
                                <span class="rarity ${rarityClass}">${c.rarity}</span>
                                ${c.starter ? '<span class="starter-badge">Starter</span>' : ''}
                            </div>
                        </article>`;
                    }

                    const sectionsHTML = elements.map(el => `
                        <section class="elem-section" data-elem="${el.key}">
                            <div class="elem-header" style="--elem-color:${el.color}">${el.icon} ${el.label}</div>
                            <div class="card-grid">${el.cards.map(cardHTML).join('')}</div>
                        </section>
                    `).join('');

                    const filterHTML = `<div class="elem-filter" id="elem-filter">
                        <button class="elem-btn active" data-elem="all">All</button>
                        ${elements.map(el => `<button class="elem-btn" data-elem="${el.key}">${el.icon} ${el.label}</button>`).join('')}
                    </div>`;

                    setTimeout(() => {
                        document.getElementById('elem-filter').addEventListener('click', e => {
                            const btn = e.target.closest('.elem-btn');
                            if (!btn) return;
                            const target = btn.dataset.elem;
                            document.querySelectorAll('.elem-btn').forEach(b => b.classList.toggle('active', b === btn));
                            document.querySelectorAll('.elem-section').forEach(s => {
                                s.style.display = (target === 'all' || s.dataset.elem === target) ? '' : 'none';
                            });
                        });
                    }, 0);

                    return `
                    <div class="page">
                        <h1 class="page-title">Card Reference</h1>
                        <p class="subtitle">All spells available in the game. Starter cards are included in class starting decks.</p>
                        ${filterHTML}
                        ${sectionsHTML}
                    </div>`;
                }
            }
        };

        function getRoute() {
            return location.hash.replace(/^#\/?/, '');
        }

        function render() {
            const route = getRoute();
            const page = pages[route] || pages[''];
            document.title = page.title;
            document.getElementById('app').innerHTML = page.render();
            window.scrollTo(0, 0);

            // Update active nav link
            document.querySelectorAll('#main-nav a').forEach(a => {
                a.classList.toggle('active', a.dataset.route === (pages[route] ? route : ''));
            });
        }

        window.addEventListener('hashchange', render);
        render();
    </script>
