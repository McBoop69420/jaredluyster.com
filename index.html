<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wizard Battle is a roguelike deckbuilder where eight elemental wizards climb the Arcane Tower.">
    <title>Wizard Battle</title>
    <link rel="stylesheet" href="shared-theme.css">
    <style>
        body {
            overflow-x: hidden;
            padding-bottom: 64px;
        }

        /* ── Home ── */
        .hero {
            padding: 72px 0 48px;
        }

        .hero-copy,
        .panel,
        .wizard {
            border: 1px solid var(--line);
            background: var(--card);
            box-shadow: var(--shadow);
        }

        .hero-copy {
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            padding: 36px;
        }

        .hero-copy::before {
            content: "";
            position: absolute;
            inset: auto -12% -36% auto;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(240, 190, 99, 0.22), transparent 68%);
            pointer-events: none;
        }

        h1 {
            margin: 18px 0 12px;
            font-size: clamp(3.2rem, 10vw, 6rem);
            line-height: 0.92;
        }

        h2 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3rem);
        }

        .section-head p,
        .panel p,
        .wizard p {
            color: var(--muted);
            line-height: 1.7;
        }

        .cta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 28px 0 24px;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .stat {
            border-radius: 18px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
        }

        .stat strong {
            display: block;
            font-size: 1.8rem;
            font-family: Georgia, "Times New Roman", serif;
        }

        .stat span {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        section { padding: 26px 0 10px; }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
            margin-bottom: 18px;
        }

        .section-head p { max-width: 34rem; }

        .feature-grid,
        .wizard-grid {
            display: grid;
            gap: 16px;
        }

        .feature-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .wizard-grid  { grid-template-columns: repeat(4, minmax(0, 1fr)); }

        .panel,
        .wizard {
            border-radius: 24px;
            padding: 24px;
        }

        .panel strong,
        .wizard-top strong {
            display: block;
            margin-bottom: 10px;
            font-size: 1.15rem;
        }

        .panel .accent {
            color: var(--gold);
            font-size: 0.82rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .wizard-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 10px;
        }

        .wizard-top span {
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .sigil {
            display: inline-grid;
            place-items: center;
            width: 54px;
            height: 54px;
            margin-bottom: 14px;
            border-radius: 16px;
            font-size: 1.7rem;
            background: rgba(255, 255, 255, 0.05);
        }

        .footer {
            padding: 36px 0 48px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        /* ── Cards ── */
        .page { max-width: 1280px; margin: 0 auto; padding: 32px 16px 0; position: relative; z-index: 1; }

        .page-title {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: var(--gold);
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 32px;
            text-align: center;
        }

        .cards-toolbar {
            display: grid;
            gap: 16px;
            margin-bottom: 28px;
        }

        .cards-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .meta-pill {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .meta-pill strong {
            color: #fff;
            margin-right: 6px;
        }

        .cards-search {
            width: min(560px, 100%);
            margin: 0 auto;
            display: block;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(12, 14, 23, 0.72);
            color: #fff;
            font: inherit;
        }

        .cards-search::placeholder { color: var(--muted); }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 10px;
        }

        .spell-card {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .card-name { font-size: 0.92rem; font-weight: 700; }

        .card-cost {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(164, 123, 255, 0.25);
            border: 1px solid rgba(164, 123, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: #c8aaff;
        }

        .card-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }

        /* ── Keywords ── */
        .page-centered {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 16px 0;
        }

        .keyword-grid {
            width: 100%;
            max-width: 780px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .keyword-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 16px 18px;
            display: grid;
            grid-template-columns: 40px 1fr;
            gap: 0 12px;
            align-items: start;
        }

        .keyword-icon { font-size: 1.6rem; line-height: 1; padding-top: 2px; text-align: center; }

        .keyword-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }

        .keyword-name { font-size: 1rem; font-weight: 700; }

        .keyword-short {
            font-size: 0.78rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .keyword-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

        /* ── Type Chart ── */
        .page-narrow { max-width: 840px; margin: 0 auto; padding: 48px 16px 0; position: relative; z-index: 1; }

        table { width: 100%; border-collapse: separate; border-spacing: 6px; }

        th, td { padding: 10px 8px; text-align: center; border-radius: 10px; }

        th { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

        td { background: var(--card); border: 1px solid var(--line); font-weight: 700; }

        .good { color: #9be48b; }
        .bad  { color: #ffb28f; }

        /* ── Cards extended ── */
        .elem-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 28px;
            justify-content: center;
        }

        .elem-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: var(--card);
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .elem-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
        .elem-btn.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.25); }

        .elem-section { margin-bottom: 32px; }

        .elem-section[hidden] { display: none; }

        .elem-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--elem-color, var(--muted));
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line);
        }

        .rarity {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 2px 7px;
            border-radius: 8px;
        }

        .rarity-common  { background: rgba(156,163,175,0.15); color: #9ca3af; }
        .rarity-uncommon { background: rgba(129,140,248,0.18); color: #a5b4fc; }
        .rarity-rare    { background: rgba(240,190,99,0.18);  color: #f0be63; }
        .rarity-starter { background: rgba(134,184,255,0.15); color: #86b8ff; }

        .starter-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 1px 6px;
            border-radius: 6px;
            background: rgba(255,255,255,0.07);
            color: var(--muted);
        }

        .card-footer {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        /* ── Responsive ── */
        @media (max-width: 980px) {
            .feature-grid,
            .wizard-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 720px) {
            .section-head,
            .feature-grid,
            .wizard-grid,
            .hero-stats {
                display: grid;
                grid-template-columns: 1fr;
            }

            .hero { padding-top: 36px; }
            .hero-copy, .panel, .wizard { padding: 22px; border-radius: 24px; }

            .keyword-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="shell topbar-inner">
            <a class="brand" href="#" data-route="">
                <img class="brand-mark" src="wizard-hat.png" alt="Wizard Battle icon">
                <div class="brand-copy">
                    <strong>Wizard Battle</strong>
                    <span>Arcane Roguelike Deckbuilder</span>
                </div>
            </a>
            <nav class="nav" id="main-nav">
                <a href="#" data-route="">Home</a>
                <a href="#keywords" data-route="keywords">Keywords</a>
                <a href="#type-chart" data-route="type-chart">Type Chart</a>
                <a href="#cards" data-route="cards">Cards</a>
            </nav>
        </div>
    </header>

    <main id="app"></main>

    <footer class="shell footer" id="site-footer" hidden>
        Public reference pages for Wizard Battle live in this site repository.
    </footer>

    <script src="cards-data.js"></script>
    <script>
        const pages = {
            '': {
                title: 'Wizard Battle',
                render() {
                    document.getElementById('site-footer').hidden = false;
                    return `
                    <section class="hero">
                        <div class="shell hero-grid">
                            <div class="hero-copy">
                                <div class="eyebrow">Eight paths. One tower. No safe turns.</div>
                                <h1>Wizard Battle</h1>
                                <p class="lead">Wizard Battle is a roguelike deckbuilder where elemental matchups matter, every route reshapes your deck, and each wizard pushes a different style of spellcraft.</p>
                                <div class="cta-row">
                                    <a class="button button-primary" href="#keywords">Browse Keywords</a>

                                <article class="wizard"><div class="sigil">☀️</div><div class="wizard-top"><strong>Dawnmage</strong><span>Light</span></div><p>Shields, heals, and Blind.</p></article>
                                <article class="wizard"><div class="sigil">🌿</div><div class="wizard-top"><strong>Verdantmaker</strong><span>Grass</span></div><p>Root stacks with exponential burst damage.</p></article>
                            </div>
                        </div>
                    </section>`;
                }
            },

            'keywords': {
                title: 'Wizard Battle — Keywords',
                render() {
                    document.getElementById('site-footer').hidden = true;
                    return `
                    <div class="page-centered">
                        <h1 class="page-title" style="font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:.06em;">Keywords</h1>
                        <p class="subtitle" style="letter-spacing:.05em;">Reference page for the game's core mechanics and status terms.</p>
                        <div class="keyword-grid">
                            <article class="keyword-card"><div class="keyword-icon">🔥</div><div><div class="keyword-header"><div class="keyword-name">Char</div><div class="keyword-short">Burning damage</div></div><div class="keyword-desc">At the end of each turn, the target takes damage equal to its Char stacks, then loses 1 stack.</div></div></article>
                            <article class="keyword-card"><div class="keyword-icon">❄️</div><div><div class="keyword-header"><div class="keyword-name">Freeze</div><div class="keyword-short">Turn denial</div></div><div class="keyword-desc">Stacks accumulate. At 3 stacks, the enemy is Frozen and skips its action.</div></div></article>
                            <article class="keyword-card"><div class="keyword-icon">⚡</div><div><div class="keyword-header"><div class="keyword-name">Shock</div><div class="keyword-short">Lightning amplifier</div></div><div class="keyword-desc">Each Shock stack multiplies Lightning spell damage by ×1.25. Stacks are consumed on hit.</div></div></article>
                            <article class="keyword-card"><div class="keyword-icon">🌊</div><div><div class="keyword-header"><div class="keyword-name">Drown</div><div class="keyword-short">Start-of-turn damage</div></div><div class="keyword-desc">At the start of each turn, the target takes damage equal to its Drown stacks. Stacks do not decay.</div></div></article>
                            <article class="keyword-card"><div class="keyword-icon">🌿</div><div><div class="keyword-header"><div class="keyword-name">Root</div><div class="keyword-short">Burst on hit</div></div><div class="keyword-desc">When the enemy takes damage, all Root stacks are consumed and detonate for 2× stacks bonus damage.</div></div></article>
                            <article class="keyword-card"><div class="keyword-icon">✨</div><div><div class="keyword-header"><div class="keyword-name">Amplify</div><div class="keyword-short">Spell boost</div></div><div class="keyword-desc">Your next spell gains +50% effect. Consumed on cast.</div></div></article>
                            <article class="keyword-card"><div class="keyword-icon">💀</div><div><div class="keyword-header"><div class="keyword-name">Weak</div><div class="keyword-short">Damage reduction</div></div><div class="keyword-desc">The afflicted target deals 25% less damage on attacks. Each stack reduces one attack.</div></div></article>
                            <article class="keyword-card"><div class="keyword-icon">💪</div><div><div class="keyword-header"><div class="keyword-name">Strength</div><div class="keyword-short">Damage bonus</div></div><div class="keyword-desc">Each Strength stack permanently increases the target's attack and spell damage by 1.</div></div></article>
                            <article class="keyword-card"><div class="keyword-icon">😵</div><div><div class="keyword-header"><div class="keyword-name">Daze</div><div class="keyword-short">Action confusion</div></div><div class="keyword-desc">50% chance the enemy repeats its previous action instead of its intended one.</div></div></article>
                            <article class="keyword-card"><div class="keyword-icon">🌑</div><div><div class="keyword-header"><div class="keyword-name">Blind</div><div class="keyword-short">Miss chance</div></div><div class="keyword-desc">50% chance the enemy's attack misses entirely and deals no damage.</div></div></article>
                            <article class="keyword-card"><div class="keyword-icon">🩸</div><div><div class="keyword-header"><div class="keyword-name">Lifesteal</div><div class="keyword-short">HP drain</div></div><div class="keyword-desc">At the end of the turn, drains HP from the enemy equal to the stacks and heals you for the same amount.</div></div></article>

            },

            'type-chart': {
                title: 'Wizard Battle — Type Chart',
                render() {
                    document.getElementById('site-footer').hidden = true;
                    return `
                    <div class="page-narrow">
                        <h1 class="page-title" style="font-size:clamp(1.6rem,4vw,2.4rem);">Type Chart</h1>
                        <p class="subtitle">Rows are attackers. Columns are defenders.</p>

                            <thead>
                                <tr><th></th><th>Fire</th><th>Water</th><th>Rock</th><th>Lightning</th><th>Ice</th><th>Shadow</th><th>Light</th><th>Grass</th></tr>

                        </table>

                }
            },

            'cards': {
                title: 'Wizard Battle — Card Reference',
                render() {
                    document.getElementById('site-footer').hidden = true;
                    const elements = CARD_REFERENCE;
                    const allCards = elements.flatMap(el => el.cards);
                    const draftableCount = allCards.filter(card => !card.starter).length;
                    const starterCount = allCards.filter(card => card.starter).length;
                    const fadeCount = allCards.filter(card => card.fade).length;

                    function cardHTML(c) {
                        const rarityClass = 'rarity-' + c.rarity.toLowerCase();
                        return `<article class="spell-card" data-name="${c.name}" data-effects="${c.effects}${c.fade ? ' Fade.' : ''}">
                            <div class="card-header">
                                <div class="card-name">${c.name}</div>
                                <div class="card-cost">${c.cost}</div>
                            </div>
                            <div class="card-desc">${c.effects}${c.fade ? ' Fade.' : ''}</div>
                            <div class="card-footer">
                                ${c.starter ? '<span class="starter-badge">Starter Deck</span>' : `<span class="rarity ${rarityClass}">${c.rarity}</span>`}
                            </div>
                        </article>`;
                    }

                    const sectionsHTML = elements.map(el => `
                        <section class="elem-section" data-elem="${el.key}">
                            <div class="elem-header" style="--elem-color:${el.color}">${el.icon} ${el.label}</div>
                            <div class="card-grid">${el.cards.map(cardHTML).join('')}</div>
                        </section>
                    `).join('');

                    const filterHTML = `<div class="elem-filter" id="elem-filter">
                        <button class="elem-btn active" data-elem="all">All</button>
                        ${elements.map(el => `<button class="elem-btn" data-elem="${el.key}">${el.icon} ${el.label}</button>`).join('')}
                    </div>`;

                    setTimeout(() => {
                        const filter = document.getElementById('elem-filter');
                        const search = document.getElementById('card-search');
                        let activeElement = 'all';

                        function updateCards() {
                            const query = (search.value || '').trim().toLowerCase();
                            document.querySelectorAll('.elem-section').forEach(section => {
                                const matchesElement = activeElement === 'all' || section.dataset.elem === activeElement;
                                let visibleCards = 0;

                                section.querySelectorAll('.spell-card').forEach(card => {
                                    const haystack = `${card.dataset.name} ${card.dataset.effects}`.toLowerCase();
                                    const matchesQuery = !query || haystack.includes(query);
                                    const show = matchesElement && matchesQuery;
                                    card.hidden = !show;
                                    if (show) visibleCards += 1;
                                });

                                section.hidden = visibleCards === 0 || !matchesElement;
                            });
                        }

                        filter.addEventListener('click', e => {
                            const btn = e.target.closest('.elem-btn');
                            if (!btn) return;
                            activeElement = btn.dataset.elem;
                            document.querySelectorAll('.elem-btn').forEach(b => b.classList.toggle('active', b === btn));
                            updateCards();
                        });

                        search.addEventListener('input', updateCards);
                        updateCards();
                    }, 0);

                    return `
                    <div class="page">
                        <h1 class="page-title">Card Reference</h1>
                        <p class="subtitle">Full spell list for every element, including class starters and shared neutral cards.</p>
                        <div class="cards-toolbar">
                            <div class="cards-meta">
                                <span class="meta-pill"><strong>${allCards.length}</strong>Total cards</span>
                                <span class="meta-pill"><strong>${draftableCount}</strong>Draft pool</span>
                                <span class="meta-pill"><strong>${starterCount}</strong>Starter cards</span>
                                <span class="meta-pill"><strong>${fadeCount}</strong>Fade cards</span>
                            </div>
                            <input class="cards-search" id="card-search" type="search" placeholder="Search cards, effects, or keywords">
                        </div>
                        ${filterHTML}
                        ${sectionsHTML}
                    </div>`;
                }
            }
        };

        function getRoute() {
            return location.hash.replace(/^#\/?/, '');
        }

        function render() {
            const route = getRoute();
            const page = pages[route] || pages[''];
            document.title = page.title;
            document.getElementById('app').innerHTML = page.render();
            window.scrollTo(0, 0);

            // Update active nav link
            document.querySelectorAll('#main-nav a').forEach(a => {
                a.classList.toggle('active', a.dataset.route === (pages[route] ? route : ''));
            });
        }

        window.addEventListener('hashchange', render);
        render();
    </script>
</body>
</html>
