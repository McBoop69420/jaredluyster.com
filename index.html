<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wizard Battle is a roguelike deckbuilder where eight elemental wizards journey through a world where magic replaced technology.">
    <title>Wizard Battle</title>
    <link rel="stylesheet" href="shared-theme.css">
    <style>
        body {
            overflow-x: hidden;
            padding-bottom: 64px;
        }

        /* ── Home ── */
        .hero {
            padding: 72px 0 48px;
        }

        .hero-copy,
        .panel,
        .wizard {
            border: 1px solid var(--line);
            background: var(--card);
            box-shadow: var(--shadow);
        }

        .hero-copy {
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            padding: 36px;
        }

        .hero-copy::before {
            content: "";
            position: absolute;
            inset: auto -12% -36% auto;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(240, 190, 99, 0.22), transparent 68%);
            pointer-events: none;
        }

        h1 {
            margin: 18px 0 12px;
            font-size: clamp(3.2rem, 10vw, 6rem);
            line-height: 0.92;
        }

        h2 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3rem);
        }

        .section-head p,
        .panel p,
        .wizard p {
            color: var(--muted);
            line-height: 1.7;
        }

        .cta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 28px 0 24px;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .stat {
            border-radius: 18px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
        }

        .stat strong {
            display: block;
            font-size: 1.8rem;
            font-family: Georgia, "Times New Roman", serif;
        }

        .stat span {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        section { padding: 26px 0 10px; }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
            margin-bottom: 18px;
        }

        .section-head p { max-width: 34rem; }

        .feature-grid,
        .wizard-grid {
            display: grid;
            gap: 16px;
        }

        .feature-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .wizard-grid  { grid-template-columns: repeat(4, minmax(0, 1fr)); }

        .panel,
        .wizard {
            border-radius: 24px;
            padding: 24px;
        }

        .panel strong,
        .wizard-top strong {
            display: block;
            margin-bottom: 10px;
            font-size: 1.15rem;
        }

        .panel .accent {
            color: var(--gold);
            font-size: 0.82rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .wizard-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 10px;
        }

        .wizard-top span {
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .sigil {
            display: inline-grid;
            place-items: center;
            width: 54px;
            height: 54px;
            margin-bottom: 14px;
            border-radius: 16px;
            font-size: 1.7rem;
            background: rgba(255, 255, 255, 0.05);
        }

        .footer {
            padding: 36px 0 48px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        /* ── Cards ── */
        .page { max-width: 1280px; margin: 0 auto; padding: 32px 16px 0; position: relative; z-index: 1; }

        .page-title {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: var(--gold);
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 32px;
            text-align: center;
        }

        .cards-toolbar {
            display: grid;
            gap: 16px;
            margin-bottom: 28px;
        }

        .cards-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .meta-pill {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }

        .meta-pill:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
        .meta-pill.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.25); }

        .meta-pill strong {
            color: #fff;
            margin-right: 6px;
        }

        .cards-search {
            width: min(560px, 100%);
            margin: 0 auto;
            display: block;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(12, 14, 23, 0.72);
            color: #fff;
            font: inherit;
        }

        .cards-search::placeholder { color: var(--muted); }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 10px;
        }

        .spell-card {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .spell-card[hidden] { display: none; }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .card-name { font-size: 0.92rem; font-weight: 700; }

        .card-cost {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(164, 123, 255, 0.25);
            border: 1px solid rgba(164, 123, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: #c8aaff;
        }

        .card-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }

        /* ── Keywords ── */
        .page-centered {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 16px 0;
        }

        .keyword-grid {
            width: 100%;
            max-width: 780px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .keyword-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 16px 18px;
            display: grid;
            grid-template-columns: 40px 1fr;
            gap: 0 12px;
            align-items: start;
        }

        .keyword-icon {
            font-size: 1.6rem;
            line-height: 1;
            padding-top: 2px;
            text-align: center;
            width: 40px;
            height: 40px;
            display: grid;
            place-items: center;
            border-radius: 10px;
            background: color-mix(in srgb, var(--kw-color, var(--gold)) 15%, transparent);
        }

        .keyword-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }

        .keyword-name { font-size: 1rem; font-weight: 700; }

        .keyword-short {
            font-size: 0.78rem;
            color: var(--kw-color, var(--gold));
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .keyword-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

        /* ── Type Chart ── */
        .page-narrow { max-width: 840px; margin: 0 auto; padding: 48px 16px 0; position: relative; z-index: 1; }

        table { width: 100%; border-collapse: separate; border-spacing: 6px; table-layout: fixed; }

        th, td { padding: 10px 4px; text-align: center; border-radius: 10px; width: 11.1%; }

        th { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

        td { background: var(--card); border: 1px solid var(--line); font-weight: 700; }

        .good { color: #9be48b; }
        .bad  { color: #ffb28f; }

        /* ── Cards extended ── */
        .elem-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 28px;
            justify-content: center;
        }

        .elem-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: var(--card);
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .elem-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
        .elem-btn.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.25); }

        .elem-section { margin-bottom: 32px; }

        .elem-section[hidden] { display: none; }

        .elem-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--elem-color, var(--muted));
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line);
        }

        .rarity {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 2px 7px;
            border-radius: 8px;
        }

        .rarity-common  { background: rgba(156,163,175,0.15); color: #9ca3af; }
        .rarity-uncommon { background: rgba(129,140,248,0.18); color: #a5b4fc; }
        .rarity-rare    { background: rgba(240,190,99,0.18);  color: #f0be63; }
        .rarity-starter { background: rgba(134,184,255,0.15); color: #86b8ff; }

        .starter-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 1px 6px;
            border-radius: 6px;
            background: rgba(255,255,255,0.07);
            color: var(--muted);
        }

        .card-footer {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        /* ── Type Chart Wheel ── */
        .wheel-section {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        .wheel-container { position: relative; width: 340px; height: 460px; }
        svg.wheel { width: 340px; height: 460px; overflow: visible; }
        .type-node { cursor: pointer; transition: filter 0.15s; }
        .type-node:hover { filter: brightness(1.3); }
        .type-node.selected { filter: brightness(1.5) drop-shadow(0 0 8px currentColor); }
        .type-node.dimmed { filter: brightness(0.35) saturate(0.2); }

        /* ── Responsive ── */
        @media (max-width: 980px) {
            .feature-grid,
            .wizard-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 720px) {
            .section-head,
            .feature-grid,
            .wizard-grid,
            .hero-stats {
                display: grid;
                grid-template-columns: 1fr;
            }

            .hero { padding-top: 36px; }
            .hero-copy, .panel, .wizard { padding: 22px; border-radius: 24px; }

            .keyword-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="shell topbar-inner">
            <a class="brand" href="#" data-route="">
                <img class="brand-mark" src="wizard-hat.png" alt="Wizard Battle icon">
                <div class="brand-copy">
                    <strong>Wizard Battle</strong>
                    <span>Roguelike Deckbuilder</span>
                </div>
            </a>
            <nav class="nav" id="main-nav">
                <a href="#" data-route="">Home</a>
                <a href="#keywords" data-route="keywords">Keywords</a>
                <a href="#type-chart" data-route="type-chart">Type Chart</a>
                <a href="#cards" data-route="cards">Cards</a>
            </nav>
        </div>
    </header>

    <main id="app"></main>

    <footer class="shell footer" id="site-footer" hidden>
        Public reference pages for Wizard Battle live in this site repository.
    </footer>

    <script src="cards-data.js"></script>
    <script>
        const pages = {
            '': {
                title: 'Wizard Battle',
                render() {
                    document.getElementById('site-footer').hidden = false;
                    return `
                    <section class="hero">
                        <div class="shell hero-grid">
                            <div class="hero-copy">
                                <div class="eyebrow">Eight paths. One journey. No safe turns.</div>
                                <h1>Wizard Battle</h1>
                                <p class="lead">Wizard Battle is a roguelike deckbuilder where elemental matchups matter, every route reshapes your deck, and each wizard pushes a different style of spellcraft.</p>
                                <div class="cta-row">
                                    <a class="button button-primary" href="#keywords">Browse Keywords</a>
                                    <a class="button button-secondary" href="#type-chart">View Type Chart</a>
                                    <a class="button button-secondary" href="#cards">View All Cards</a>
                                </div>
                                <div class="hero-stats">
                                    <div class="stat"><strong>8</strong><span>Wizard classes</span></div>
                                    <div class="stat"><strong>56</strong><span>Spells to draft</span></div>
                                    <div class="stat"><strong>12</strong><span>Floors per journey</span></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="features">
                        <div class="shell">
                            <div class="section-head">
                                <h2>Built Around Sharp Decisions</h2>
                                <p>Wizard Battle rewards players who plan ahead and adapt on the fly. Every choice builds or breaks your run.</p>
                            </div>
                            <div class="feature-grid">
                                <article class="panel">
                                    <div class="accent">Elemental Matchups</div>
                                    <strong>Type advantages change every fight</strong>
                                    <p>The right spell can end a fight early. The wrong one can stall your whole run.</p>
                                </article>
                                <article class="panel">
                                    <div class="accent">Map Routing</div>
                                    <strong>Each node is a commitment</strong>
                                    <p>Safer paths buy time. Harder ones offer bigger rewards. Shops and rest sites keep runs alive.</p>
                                </article>
                                <article class="panel">
                                    <div class="accent">Deckbuilding</div>
                                    <strong>Every reward changes your line</strong>
                                    <p>Add tools, trim greed, and build around the wizard you picked at the start of your journey.</p>
                                </article>
                            </div>
                        </div>
                    </section>

                    <section id="wizards">
                        <div class="shell">
                            <div class="section-head">
                                <h2>Choose Your Wizard</h2>
                                <p>Each wizard approaches the journey differently. Same rules, different pressure.</p>
                            </div>
                            <div class="wizard-grid">
                                <article class="wizard"><div class="sigil">🔥</div><div class="wizard-top"><strong>Pyromancer</strong><span>Fire</span></div><p>Char stacks and relentless damage pressure.</p></article>
                                <article class="wizard"><div class="sigil">🌊</div><div class="wizard-top"><strong>Tidecaller</strong><span>Water</span></div><p>Healing, mana generation, and Drown control.</p></article>
                                <article class="wizard"><div class="sigil">🪨</div><div class="wizard-top"><strong>Stonewarden</strong><span>Rock</span></div><p>Max defense — outlast every enemy with Daze.</p></article>
                                <article class="wizard"><div class="sigil">⚡</div><div class="wizard-top"><strong>Stormseeker</strong><span>Arc</span></div><p>Fast chains and Shock combos.</p></article>
                                <article class="wizard"><div class="sigil">❄️</div><div class="wizard-top"><strong>Frostweaver</strong><span>Ice</span></div><p>Freeze stacks to deny enemy turns.</p></article>
                                <article class="wizard"><div class="sigil">🌑</div><div class="wizard-top"><strong>Shadowblade</strong><span>Shadow</span></div><p>Lifesteal, curses, and Weak.</p></article>
                                <article class="wizard"><div class="sigil">☀️</div><div class="wizard-top"><strong>Dawnmage</strong><span>Light</span></div><p>Shields, heals, and Blind.</p></article>
                                <article class="wizard"><div class="sigil">🌿</div><div class="wizard-top"><strong>Verdantmaker</strong><span>Grass</span></div><p>Root stacks with exponential burst damage.</p></article>
                            </div>
                        </div>
                    </section>`;
                }
            },

            'keywords': {
                title: 'Wizard Battle — Keywords',
                render() {
                    document.getElementById('site-footer').hidden = true;
                    return `
                    <div class="page-centered">
                        <h1 class="page-title" style="font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:.06em;">Keywords</h1>
                        <p class="subtitle" style="letter-spacing:.05em;">Reference page for the game's core mechanics and status terms.</p>
                        <div class="keyword-grid">
                            <article class="keyword-card" style="--kw-color:#94a3b8"><div class="keyword-icon">🛡️</div><div><div class="keyword-header"><div class="keyword-name">Block</div><div class="keyword-short">Damage absorption</div></div><div class="keyword-desc">Absorbs incoming damage before HP. Block resets to 0 at the start of your next turn and does not carry between encounters.</div></div></article>
                            <article class="keyword-card" style="--kw-color:#c4b5fd"><div class="keyword-icon">🪄</div><div><div class="keyword-header"><div class="keyword-name">Fade</div><div class="keyword-short">Single use</div></div><div class="keyword-desc">This card is removed from your deck after it is played. It does not go to the discard pile.</div></div></article>
                            <article class="keyword-card" style="--kw-color:#ff6633"><div class="keyword-icon">🔥</div><div><div class="keyword-header"><div class="keyword-name">Char</div><div class="keyword-short">Burning damage</div></div><div class="keyword-desc">At the end of each turn, the target takes damage equal to its Char stacks, then loses 1 stack.</div></div></article>
                            <article class="keyword-card" style="--kw-color:#66ddff"><div class="keyword-icon">❄️</div><div><div class="keyword-header"><div class="keyword-name">Freeze</div><div class="keyword-short">Turn denial</div></div><div class="keyword-desc">Stacks accumulate. At 3 stacks, the enemy is Frozen and skips its action.</div></div></article>
                            <article class="keyword-card" style="--kw-color:#ffdd00"><div class="keyword-icon">⚡</div><div><div class="keyword-header"><div class="keyword-name">Shock</div><div class="keyword-short">Arc amplifier</div></div><div class="keyword-desc">Each Shock stack multiplies Arc spell damage by ×1.25. Stacks are consumed on hit.</div></div></article>
                            <article class="keyword-card" style="--kw-color:#4488ff"><div class="keyword-icon">🌊</div><div><div class="keyword-header"><div class="keyword-name">Drown</div><div class="keyword-short">Start-of-turn damage</div></div><div class="keyword-desc">At the start of each turn, the target takes damage equal to its Drown stacks. Stacks do not decay.</div></div></article>
                            <article class="keyword-card" style="--kw-color:#44cc66"><div class="keyword-icon">🌿</div><div><div class="keyword-header"><div class="keyword-name">Root</div><div class="keyword-short">Burst on hit</div></div><div class="keyword-desc">When the enemy takes damage, all Root stacks are consumed and detonate for 2× stacks bonus damage.</div></div></article>
                            <article class="keyword-card" style="--kw-color:#cc6666"><div class="keyword-icon">💔</div><div><div class="keyword-header"><div class="keyword-name">Weak</div><div class="keyword-short">Damage reduction</div></div><div class="keyword-desc">The afflicted target deals 25% less damage on attacks. Each stack reduces one attack.</div></div></article>
                            <article class="keyword-card" style="--kw-color:#d4af37"><div class="keyword-icon">💪</div><div><div class="keyword-header"><div class="keyword-name">Strength</div><div class="keyword-short">Damage bonus</div></div><div class="keyword-desc">Each Strength stack permanently increases the target's attack and spell damage by 1.</div></div></article>
                            <article class="keyword-card" style="--kw-color:#cc9944"><div class="keyword-icon">💫</div><div><div class="keyword-header"><div class="keyword-name">Daze</div><div class="keyword-short">Action confusion</div></div><div class="keyword-desc">50% chance the enemy repeats its previous action instead of its intended one.</div></div></article>
                            <article class="keyword-card" style="--kw-color:#f2f2f2"><div class="keyword-icon">✨</div><div><div class="keyword-header"><div class="keyword-name">Blind</div><div class="keyword-short">Miss chance</div></div><div class="keyword-desc">50% chance the enemy's attack misses entirely and deals no damage.</div></div></article>
                            <article class="keyword-card" style="--kw-color:#cc66ff"><div class="keyword-icon">🌙</div><div><div class="keyword-header"><div class="keyword-name">Lifesteal</div><div class="keyword-short">HP drain</div></div><div class="keyword-desc">At the end of the turn, drains HP from the enemy equal to the stacks and heals you for the same amount.</div></div></article>
                        </div>
                    </div>`;
                }
            },

            'type-chart': {
                title: 'Wizard Battle — Type Chart',
                render() {
                    document.getElementById('site-footer').hidden = true;
                    setTimeout(() => {
                        const TYPES = ['Fire','Water','Rock','Arc','Ice','Shadow','Light','Grass'];
                        const TYPE_ICONS = { Fire:'🔥', Water:'🌊', Rock:'🪨', Arc:'⚡', Ice:'❄️', Shadow:'🌑', Light:'☀️', Grass:'🌿' };
                        const TYPE_COLORS = { Fire:'#ff4422', Water:'#2277ff', Rock:'#a87832', Arc:'#ffe000', Ice:'#88ddff', Shadow:'#bb33ee', Light:'#ffe066', Grass:'#33aa55' };
                        // Inner triangles: Fire→Ice→Arc→Fire | Grass→Rock→Water→Grass
                        // Outer ring: Fire→Grass→Ice→Rock→Arc→Fire
                        // Shadow↔Light mutual 2×, self 0.5×
                        // Outer ring: Fire→Grass→Ice→Rock→Arc→Water→Fire
                        // Inner tri 1: Fire→Ice→Arc→Fire | Inner tri 2: Grass→Rock→Water→Grass
                        // Each type: 2 strengths, 2 weaknesses (symmetric: A beats B → A=2× vs B, B=0.5× vs A)
                        // Fire:  beats Grass+Ice,  weak to Water+Arc
                        // Grass: beats Ice+Rock,   weak to Fire+Water
                        // Ice:   beats Rock+Arc,   weak to Grass+Fire
                        // Rock:  beats Arc+Water,  weak to Ice+Grass
                        // Arc:   beats Water+Fire, weak to Rock+Ice
                        // Water: beats Fire+Grass, weak to Arc+Rock
                        const EFF = {
                            Fire:   { Fire:1, Water:0.5, Rock:1,   Arc:0.5, Ice:2,   Shadow:1,   Light:1,   Grass:2   },
                            Water:  { Fire:2, Water:1,   Rock:0.5, Arc:0.5, Ice:1,   Shadow:1,   Light:1,   Grass:2   },
                            Rock:   { Fire:1, Water:2,   Rock:1,   Arc:2,   Ice:0.5, Shadow:1,   Light:1,   Grass:0.5 },
                            Arc:    { Fire:2, Water:2,   Rock:0.5, Arc:1,   Ice:0.5, Shadow:1,   Light:1,   Grass:1   },
                            Ice:    { Fire:0.5, Water:1, Rock:2,   Arc:2,   Ice:1,   Shadow:1,   Light:1,   Grass:0.5 },
                            Shadow: { Fire:1, Water:1,   Rock:1,   Arc:1,   Ice:1,   Shadow:0.5, Light:2,   Grass:1   },
                            Light:  { Fire:1, Water:1,   Rock:1,   Arc:1,   Ice:1,   Shadow:2,   Light:0.5, Grass:1   },
                            Grass:  { Fire:0.5, Water:0.5, Rock:2, Arc:1,   Ice:2,   Shadow:1,   Light:1,   Grass:1   },
                        };

                        // Hexagon: Fire(top) → Grass → Ice → Rock → Arc → Water → back to Fire
                        // Clockwise starting at top
                        const R = 110;
                        const hexOrder = ['Fire','Grass','Ice','Rock','Arc','Water'];
                        const positions = {};
                        hexOrder.forEach((t, i) => {
                            const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
                            positions[t] = { x: Math.cos(angle) * R, y: Math.sin(angle) * R };
                        });
                        positions.Shadow = { x: -75, y: 210 };
                        positions.Light  = { x:  75, y: 210 };

                        const svg = document.getElementById('wheelSvg');
                        const arrowLayer = document.getElementById('arrowLayer');
                        const nodeLayer  = document.getElementById('nodeLayer');

                        function shortenLine(x1,y1,x2,y2,amt) {
                            const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
                            return { x1:x1+dx/len*amt, y1:y1+dy/len*amt, x2:x2-dx/len*amt, y2:y2-dy/len*amt };
                        }

                        const OFFSET = 9;
                        function hasBoth(a,b) {
                            const fv=EFF[a][b], rv=EFF[b][a];
                            return (fv>=2||fv<=0.5)&&(rv>=2||rv<=0.5);
                        }
                        function pairOffset(from,to,val) {
                            const pa=positions[from], pb=positions[to];
                            const dx=pb.x-pa.x, dy=pb.y-pa.y, len=Math.sqrt(dx*dx+dy*dy);
                            const nx=-dy/len, ny=dx/len;
                            const mx=(pa.x+pb.x)/2, my=(pa.y+pb.y)/2;
                            const outward=(mx*nx+my*ny)>0?1:-1;
                            const side=val>=2?outward:-outward;
                            return { ox:nx*OFFSET*side, oy:ny*OFFSET*side };
                        }

                        // Outer ring edges (adjacent hexagon nodes)
                        const outerRing = [['Fire','Grass'],['Grass','Ice'],['Ice','Rock'],['Rock','Arc'],['Arc','Water'],['Water','Fire']];
                        // Inner triangle edges (skip-one)
                        const innerTri = [['Fire','Ice'],['Ice','Arc'],['Arc','Fire'],['Grass','Rock'],['Rock','Water'],['Water','Grass']];
                        const innerSet = new Set(innerTri.map(([a,b]) => a+'>'+b));

                        // Draw all arrows with equal style
                        [...outerRing, ...innerTri].forEach(([attacker, defender]) => {
                            const p1=positions[attacker], p2=positions[defender];
                            const s=shortenLine(p1.x,p1.y,p2.x,p2.y,36);
                            const line=document.createElementNS('http://www.w3.org/2000/svg','line');
                            line.setAttribute('x1',s.x1); line.setAttribute('y1',s.y1);
                            line.setAttribute('x2',s.x2); line.setAttribute('y2',s.y2);
                            line.setAttribute('stroke','#66ff99'); line.setAttribute('stroke-width','2');
                            line.setAttribute('opacity','0.65');
                            line.setAttribute('marker-end','url(#arr-super)');
                            line.setAttribute('class',`arrow from-${attacker} to-${defender}`);
                            arrowLayer.appendChild(line);
                        });

                        // Shadow↔Light mutual 2× arrows (offset so both directions are visible)
                        [['Shadow','Light'],['Light','Shadow']].forEach(([attacker, defender]) => {
                            const p1=positions[attacker], p2=positions[defender];
                            const s=shortenLine(p1.x,p1.y,p2.x,p2.y,36);
                            const oy = attacker==='Shadow' ? -10 : 10;
                            const line=document.createElementNS('http://www.w3.org/2000/svg','line');
                            line.setAttribute('x1',s.x1); line.setAttribute('y1',s.y1+oy);
                            line.setAttribute('x2',s.x2); line.setAttribute('y2',s.y2+oy);
                            line.setAttribute('stroke','#66ff99'); line.setAttribute('stroke-width','2');
                            line.setAttribute('opacity','0.65');
                            line.setAttribute('marker-end','url(#arr-super)');
                            line.setAttribute('class',`arrow from-${attacker} to-${defender}`);
                            arrowLayer.appendChild(line);
                        });

                        // Self-referential 0.5× loops for Shadow and Light (red)
                        // Shadow center (-75,210) radius 32; Light center (75,210) radius 32
                        // Start/end on circle edge at ~45° from vertical, looping outward
                        [{t:'Shadow', sx:-97, sy:188, cx1:-148, cy1:172, cx2:-148, cy2:248, ex:-97, ey:232},
                         {t:'Light',  sx: 97, sy:188, cx1: 148, cy1:172, cx2: 148, cy2:248, ex: 97, ey:232}
                        ].forEach(({t, sx, sy, cx1, cy1, cx2, cy2, ex, ey}) => {
                            const path=document.createElementNS('http://www.w3.org/2000/svg','path');
                            path.setAttribute('d',`M ${sx},${sy} C ${cx1},${cy1} ${cx2},${cy2} ${ex},${ey}`);
                            path.setAttribute('stroke','#ff4444'); path.setAttribute('stroke-width','2');
                            path.setAttribute('fill','none'); path.setAttribute('opacity','0.75');
                            path.setAttribute('marker-end','url(#arr-self-red)');
                            path.setAttribute('class',`self-arrow from-${t} to-${t}`);
                            arrowLayer.appendChild(path);
                        });

                        let selectedType=null;
                        Object.keys(positions).forEach(t => {
                            const pos=positions[t];
                            const g=document.createElementNS('http://www.w3.org/2000/svg','g');
                            g.setAttribute('class','type-node'); g.setAttribute('data-type',t);
                            g.setAttribute('transform',`translate(${pos.x},${pos.y})`);
                            g.style.cursor='pointer';
                            const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
                            circle.setAttribute('r','32');
                            circle.setAttribute('fill',TYPE_COLORS[t]+'22');
                            circle.setAttribute('stroke',TYPE_COLORS[t]);
                            circle.setAttribute('stroke-width','2.5');
                            const emoji=document.createElementNS('http://www.w3.org/2000/svg','text');
                            emoji.setAttribute('text-anchor','middle'); emoji.setAttribute('dominant-baseline','central');
                            emoji.setAttribute('y','-7'); emoji.setAttribute('font-size','18');
                            emoji.textContent=TYPE_ICONS[t];
                            const label=document.createElementNS('http://www.w3.org/2000/svg','text');
                            label.setAttribute('text-anchor','middle'); label.setAttribute('dominant-baseline','central');
                            label.setAttribute('y','14'); label.setAttribute('font-size','8');
                            label.setAttribute('fill',TYPE_COLORS[t]); label.setAttribute('font-weight','700');
                            label.setAttribute('letter-spacing','0.04em');
                            label.textContent=t.toUpperCase();
                            g.appendChild(circle); g.appendChild(emoji); g.appendChild(label);
                            g.addEventListener('click', () => {
                                if (selectedType===t) {
                                    selectedType=null;
                                    nodeLayer.querySelectorAll('.type-node').forEach(n=>n.setAttribute('opacity','1'));
                                    arrowLayer.querySelectorAll('line,path').forEach(l=>l.setAttribute('opacity','0.6'));
                                    return;
                                }
                                selectedType=t;
                                nodeLayer.querySelectorAll('.type-node').forEach(n => {
                                    n.setAttribute('opacity', n.getAttribute('data-type')===t ? '1' : '0.25');
                                });
                                arrowLayer.querySelectorAll('line,path').forEach(l => {
                                    const cls=l.getAttribute('class')||'';
                                    l.setAttribute('opacity', cls.includes(`from-${t}`)||cls.includes(`to-${t}`) ? '1' : '0.05');
                                });
                            });
                            nodeLayer.appendChild(g);
                        });
                    }, 0);

                    return `
                    <div class="page-narrow">
                        <h1 class="page-title" style="font-size:clamp(1.6rem,4vw,2.4rem);">Type Chart</h1>
                        <p class="subtitle">Click a type to highlight its matchups. Rows are attackers, columns are defenders.</p>
                        <div style="display:flex;justify-content:center;margin-bottom:40px;">
                          <svg id="wheelSvg" style="width:340px;height:460px;overflow:visible;" viewBox="-175 -150 350 470">
                            <defs>
                              <marker id="arr-super"    markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#66ff99" opacity="0.85"/></marker>
                              <marker id="arr-self"     markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff7755" opacity="0.9"/></marker>
                              <marker id="arr-self-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff4444" opacity="0.9"/></marker>
                            </defs>
                            <g id="arrowLayer"></g>
                            <g id="nodeLayer"></g>
                          </svg>
                        </div>
                        <table>
                            <thead>
                                <tr><th></th><th>Fire</th><th>Water</th><th>Rock</th><th>Arc</th><th>Ice</th><th>Shadow</th><th>Light</th><th>Grass</th></tr>
                            </thead>
                            <tbody>
                                <tr><th>Fire</th>  <td>1x</td><td class="bad">0.5x</td><td>1x</td><td class="bad">0.5x</td><td class="good">2x</td><td>1x</td><td>1x</td><td class="good">2x</td></tr>
                                <tr><th>Water</th> <td class="good">2x</td><td>1x</td><td class="bad">0.5x</td><td class="bad">0.5x</td><td>1x</td><td>1x</td><td>1x</td><td class="good">2x</td></tr>
                                <tr><th>Rock</th>  <td>1x</td><td class="good">2x</td><td>1x</td><td class="good">2x</td><td class="bad">0.5x</td><td>1x</td><td>1x</td><td class="bad">0.5x</td></tr>
                                <tr><th>Arc</th>   <td class="good">2x</td><td class="good">2x</td><td class="bad">0.5x</td><td>1x</td><td class="bad">0.5x</td><td>1x</td><td>1x</td><td>1x</td></tr>
                                <tr><th>Ice</th>   <td class="bad">0.5x</td><td>1x</td><td class="good">2x</td><td class="good">2x</td><td>1x</td><td>1x</td><td>1x</td><td class="bad">0.5x</td></tr>
                                <tr><th>Shadow</th><td>1x</td><td>1x</td><td>1x</td><td>1x</td><td>1x</td><td class="bad">0.5x</td><td class="good">2x</td><td>1x</td></tr>
                                <tr><th>Light</th> <td>1x</td><td>1x</td><td>1x</td><td>1x</td><td>1x</td><td class="good">2x</td><td class="bad">0.5x</td><td>1x</td></tr>
                                <tr><th>Grass</th> <td class="bad">0.5x</td><td class="bad">0.5x</td><td class="good">2x</td><td>1x</td><td class="good">2x</td><td>1x</td><td>1x</td><td>1x</td></tr>
                            </tbody>
                        </table>
                    </div>`;
                }
            },

            'cards': {
                title: 'Wizard Battle — Card Reference',
                render() {
                    document.getElementById('site-footer').hidden = true;
                    const CYCLE_ORDER = ['fire','grass','ice','rock','lightning','water','shadow','light','neutral'];
                    const byKey = Object.fromEntries(CARD_REFERENCE.map(el => [el.key, el]));
                    const elements = CYCLE_ORDER.map(k => byKey[k]).filter(Boolean);
                    const allCards = elements.flatMap(el => el.cards);
                    const draftableCount = allCards.filter(card => !card.starter).length;
                    const starterCount = allCards.filter(card => card.starter).length;
                    const fadeCount = allCards.filter(card => card.fade).length;

                    const RARITY_ORDER = { Starter: 0, Common: 1, Uncommon: 2, Rare: 3 };
                    function sortedCards(cards) {
                        return [...cards].sort((a, b) => (RARITY_ORDER[a.rarity] ?? 99) - (RARITY_ORDER[b.rarity] ?? 99));
                    }

                    function cardHTML(c, color) {
                        const rarityClass = 'rarity-' + c.rarity.toLowerCase();
                        return `<article class="spell-card" data-name="${c.name}" data-effects="${c.effects}${c.fade ? ' Fade.' : ''}" data-starter="${c.starter ? '1' : '0'}" data-fade="${c.fade ? '1' : '0'}">
                            <div class="card-header">
                                <div class="card-name" style="color:${color}">${c.name}</div>
                                <div class="card-cost">${c.cost}</div>
                            </div>
                            <div class="card-desc">${c.effects}${c.fade ? ' Fade.' : ''}</div>
                            <div class="card-footer">
                                ${c.starter ? '<span class="starter-badge">Starter Deck</span>' : `<span class="rarity ${rarityClass}">${c.rarity}</span>`}
                            </div>
                        </article>`;
                    }

                    const sectionsHTML = elements.map(el => `
                        <section class="elem-section" data-elem="${el.key}">
                            <div class="elem-header" style="--elem-color:${el.color}">${el.icon} ${el.label}</div>
                            <div class="card-grid">${sortedCards(el.cards).map(c => cardHTML(c, el.color)).join('')}</div>
                        </section>
                    `).join('');

                    const filterHTML = `<div class="elem-filter" id="elem-filter">
                        <button class="elem-btn active" data-elem="all">All</button>
                        ${elements.map(el => `<button class="elem-btn" data-elem="${el.key}">${el.icon} ${el.label}</button>`).join('')}
                    </div>`;

                    setTimeout(() => {
                        const filter = document.getElementById('elem-filter');
                        const search = document.getElementById('card-search');
                        let activeElement = 'all';
                        let activePool = 'all'; // 'all' | 'draft' | 'starter' | 'fade'

                        function updateCards() {
                            const query = (search.value || '').trim().toLowerCase();
                            document.querySelectorAll('.elem-section').forEach(section => {
                                const matchesElement = activeElement === 'all' || section.dataset.elem === activeElement;
                                let visibleCards = 0;

                                section.querySelectorAll('.spell-card').forEach(card => {
                                    const haystack = `${card.dataset.name} ${card.dataset.effects}`.toLowerCase();
                                    const matchesQuery = !query || haystack.includes(query);
                                    const isStarter = card.dataset.starter === '1';
                                    const isFade = card.dataset.fade === '1';
                                    const matchesPool =
                                        activePool === 'all' ? true :
                                        activePool === 'draft' ? !isStarter :
                                        activePool === 'starter' ? isStarter :
                                        activePool === 'fade' ? isFade : true;
                                    const show = matchesElement && matchesQuery && matchesPool;
                                    card.hidden = !show;
                                    if (show) visibleCards += 1;
                                });

                                section.hidden = visibleCards === 0 || !matchesElement;
                            });
                        }

                        filter.addEventListener('click', e => {
                            const btn = e.target.closest('.elem-btn');
                            if (!btn) return;
                            activeElement = btn.dataset.elem;
                            document.querySelectorAll('.elem-btn').forEach(b => b.classList.toggle('active', b === btn));
                            updateCards();
                        });

                        document.getElementById('pool-filter').addEventListener('click', e => {
                            const btn = e.target.closest('.meta-pill');
                            if (!btn) return;
                            const pool = btn.dataset.pool;
                            activePool = activePool === pool ? 'all' : pool;
                            document.querySelectorAll('.meta-pill').forEach(b => b.classList.toggle('active', b.dataset.pool === activePool));
                            updateCards();
                        });

                        search.addEventListener('input', updateCards);
                        updateCards();
                    }, 0);

                    return `
                    <div class="page">
                        <h1 class="page-title">Card Reference</h1>
                        <p class="subtitle">Full spell list for every element, including class starters and shared neutral cards.</p>
                        <div class="cards-toolbar">
                            <div class="cards-meta" id="pool-filter">
                                <button class="meta-pill" data-pool="all"><strong>${allCards.length}</strong>Total cards</button>
                                <button class="meta-pill" data-pool="draft"><strong>${draftableCount}</strong>Draft pool</button>
                                <button class="meta-pill" data-pool="starter"><strong>${starterCount}</strong>Starter cards</button>
                            </div>
                            <input class="cards-search" id="card-search" type="search" placeholder="Search cards, effects, or keywords">
                        </div>
                        ${filterHTML}
                        ${sectionsHTML}
                    </div>`;
                }
            }
        };

        function getRoute() {
            return location.hash.replace(/^#\/?/, '');
        }

        function render() {
            const route = getRoute();
            const page = pages[route] || pages[''];
            document.title = page.title;
            document.getElementById('app').innerHTML = page.render();
            window.scrollTo(0, 0);

            // Update active nav link
            document.querySelectorAll('#main-nav a').forEach(a => {
                a.classList.toggle('active', a.dataset.route === (pages[route] ? route : ''));
            });
        }

        window.addEventListener('hashchange', render);
        render();
    </script>
</body>
</html>
